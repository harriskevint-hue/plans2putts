<title>Plans2Putts</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #000000;
    --primary: #ffffff;
    --green: #4ade80;
    --green-dim: #22c55e;
    --amber: #fbbf24;
    --red: #f87171;
    --dim: #6b7280;
    --dim2: #374151;
    --accent-bg: rgba(74,222,128,0.08);
    --accent-border: #4ade80;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; width: 100%; max-width: 600px; max-height: 600px; background: #000; color: var(--primary); overflow: hidden; }
  body { font-family: 'DM Mono', ui-monospace, monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; width: 100%; }

  /* ===== SCREENS ===== */
  .screen { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
  .hidden { display: none !important; }

  /* ===== SELECTION SCREENS ===== */
  .screen-title { font-family: 'Anton', sans-serif; font-size: 1.4rem; color: var(--green); letter-spacing: 0.1em; margin-bottom: 24px; text-align: center; }
  .nav-list { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 8px; }
  .nav-item {
    width: 100%; padding: 14px 20px; border-radius: 10px;
    border: 2px solid var(--dim2); color: var(--dim);
    font-family: 'DM Mono', monospace; font-size: 1rem; font-weight: 500;
    display: flex; justify-content: space-between; align-items: center;
    cursor: pointer; transition: all 0.1s; background: transparent;
  }
  .nav-item:focus, .nav-item.focused {
    border-color: var(--accent-border); color: var(--primary);
    background: var(--accent-bg); outline: none;
  }
  .nav-item.focused { box-shadow: 0 0 0 1px var(--green); }
  .nav-item .nav-sub { font-size: 0.75rem; color: var(--dim); }
  .nav-item.focused .nav-sub { color: var(--green-dim); }
  .screen-hint { font-size: 0.65rem; color: var(--dim2); letter-spacing: 0.12em; margin-top: 20px; text-align: center; }

  /* ===== FOCUSABLE (Meta requirement) ===== */
  .focusable:focus { outline: 2px solid var(--green); outline-offset: 2px; }

  /* ===== LOADING / ERROR ===== */
  .state-msg { text-align: center; padding: 40px 20px; }
  .state-msg h2 { font-family: 'Anton', sans-serif; font-size: 2rem; margin-bottom: 12px; }
  .state-msg p { font-size: 0.85rem; color: var(--dim); line-height: 1.6; max-width: 280px; margin: 0 auto; }
  .spinner { width: 40px; height: 40px; border: 3px solid var(--dim2); border-top-color: var(--green); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ===== HUD ===== */
  #screenHUD { gap: 6px; padding: 12px; }
  .tee-badge { font-size: 0.6rem; letter-spacing: 0.2em; color: var(--dim2); text-transform: uppercase; }
  .tee-badge span { color: var(--amber); }
  .hole-bar { display: flex; align-items: center; gap: 12px; width: 100%; justify-content: center; }
  .hole-bar button {
    font-family: 'DM Mono', monospace; font-size: 1.2rem; font-weight: 500;
    background: none; border: 2px solid var(--dim2); color: var(--dim);
    width: 44px; height: 44px; border-radius: 50%; cursor: pointer;
  }
  .hole-bar button:focus { border-color: var(--green); color: var(--green); outline: none; }
  .hole-info { text-align: center; }
  .hole-num { font-family: 'Anton', sans-serif; font-size: 1.5rem; color: var(--green); }
  .hole-meta { font-size: 0.7rem; color: var(--dim); letter-spacing: 0.1em; }
  .yardage-wrap { text-align: center; cursor: pointer; }
  .yardage-label { font-size: 0.6rem; letter-spacing: 0.2em; color: var(--dim); text-transform: uppercase; }
  .yardage { font-family: 'Anton', sans-serif; font-size: min(25vw, 144px); line-height: 1; color: var(--primary); letter-spacing: -0.02em; }
  .yardage-unit { font-size: 0.65rem; letter-spacing: 0.15em; color: var(--dim); text-transform: uppercase; }
  .tap-hint { font-size: 0.58rem; color: var(--dim2); letter-spacing: 0.08em; }
  .tap-hint.speaking { color: var(--green); }
  .fb-row { display: flex; gap: 24px; justify-content: center; padding: 5px 0; border-top: 1px solid var(--dim2); border-bottom: 1px solid var(--dim2); width: 80%; max-width: 300px; }
  .fb-item { text-align: center; }
  .fb-label { font-size: 0.58rem; letter-spacing: 0.1em; color: var(--dim); text-transform: uppercase; }
  .fb-val { font-family: 'Anton', sans-serif; font-size: 1.8rem; color: var(--green); }
  .official-yd { font-size: 0.6rem; color: var(--dim2); text-align: center; letter-spacing: 0.05em; }
  .extra-row { display: flex; gap: 20px; justify-content: center; }
  .extra-item { display: flex; align-items: center; gap: 5px; font-size: 0.72rem; }
  .dot-dg { width: 7px; height: 7px; border-radius: 50%; background: #facc15; }
  .dot-lu { width: 7px; height: 7px; border-radius: 50%; background: #a78bfa; }
  .extra-dist { font-family: 'Anton', sans-serif; font-size: 0.95rem; }
  .extra-label { color: var(--dim); font-size: 0.58rem; text-transform: uppercase; }
  .hazards { width: 100%; max-width: 380px; display: flex; flex-direction: column; gap: 3px; }
  .hz-row { display: flex; align-items: center; gap: 7px; font-size: 0.75rem; padding: 3px 10px; }
  .hz-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--amber); flex: none; }
  .hz-name { flex: 1; color: var(--dim); font-size: 0.65rem; }
  .hz-dist { font-family: 'Anton', sans-serif; font-size: 1rem; color: var(--amber); }
  .hole-dots { display: flex; gap: 4px; justify-content: center; }
  .hdot { width: 7px; height: 7px; border-radius: 50%; background: var(--dim2); }
  .hdot.done { background: var(--dim); }
  .hdot.active { background: var(--green); box-shadow: 0 0 6px rgba(74,222,128,0.5); }
  .bottom-bar { display: flex; align-items: center; justify-content: center; gap: 16px; width: 100%; }
  .gps-status { font-size: 0.58rem; color: var(--dim); letter-spacing: 0.08em; }
  .gps-status.good { color: var(--green-dim); }
  .gps-status.warn { color: var(--amber); }
  .gps-status.bad { color: var(--red); }
  .icon-btn {
    font-family: inherit; font-size: 1rem; background: none; border: 1px solid var(--dim2);
    color: var(--dim); width: 32px; height: 32px; border-radius: 50%; cursor: pointer;
  }
  .icon-btn.on { border-color: var(--green-dim); color: var(--green); }
  .icon-btn.focusable:focus { outline: 2px solid var(--green); }
</style>
</head>
<body>

  <div id="stateLoading" class="screen state-msg">
    <div class="spinner"></div>
    <h2>Acquiring GPS</h2>
    <p>Stand outside. Allow location when prompted.</p>
  </div>

  <div id="stateError" class="screen state-msg hidden">
    <h2 id="errTitle">GPS Error</h2>
    <p id="errMsg"></p>
  </div>

  <!-- Course Selection -->
  <div id="screenCourse" class="screen hidden">
    <div class="screen-title">Select Course</div>
    <div class="nav-list" id="courseList"></div>
    <div class="screen-hint">&#x2191;&#x2193; navigate &nbsp;&middot;&nbsp; Enter / pinch to select</div>
  </div>

  <!-- Tee Selection -->
  <div id="screenTee" class="screen hidden">
    <div class="screen-title">Select Tees</div>
    <div class="nav-list" id="teeList"></div>
    <div class="screen-hint">&#x2191;&#x2193; navigate &nbsp;&middot;&nbsp; Enter / pinch to select</div>
  </div>

  <!-- HUD -->
  <div id="screenHUD" class="screen hidden">
    <div class="tee-badge" id="teeBadge"></div>
    <div class="hole-bar">
      <button class="focusable" id="prevBtn" tabindex="0">&#8249;</button>
      <div class="hole-info">
        <div class="hole-num" id="holeNum">HOLE 1</div>
        <div class="hole-meta" id="holeMeta">Par 4</div>
      </div>
      <button class="focusable" id="nextBtn" tabindex="0">&#8250;</button>
    </div>
    <div class="yardage-wrap focusable" id="yardageTap" tabindex="0">
      <div class="yardage-label">to center</div>
      <div class="yardage" id="yardCenter">---</div>
      <div class="yardage-unit">yards</div>
      <div class="tap-hint" id="tapHint">Enter or tap for voice</div>
    </div>
    <div class="fb-row">
      <div class="fb-item"><div class="fb-label">Front</div><div class="fb-val" id="yardFront">--</div></div>
      <div class="fb-item"><div class="fb-label">Back</div><div class="fb-val" id="yardBack">--</div></div>
    </div>
    <div class="official-yd" id="officialYd"></div>
    <div class="extra-row" id="extraRow"></div>
    <div class="hazards" id="hazardList"></div>
    <div class="hole-dots" id="holeDots"></div>
    <div class="bottom-bar">
      <button class="icon-btn focusable" id="courseBtn" tabindex="0" title="Change course">&#127922;</button>
      <div class="gps-status" id="gpsStatus">GPS: acquiring...</div>
      <button class="icon-btn on focusable" id="muteBtn" tabindex="0" title="Toggle voice">&#x1f50a;</button>
    </div>
  </div>

    el.screenTee.classList.add("hidden");
    el.screenHUD.classList.add("hidden");
    if (name === "course") { el.screenCourse.classList.remove("hidden"); buildCourseList(); }
    else if (name === "tee") { el.screenTee.classList.remove("hidden"); buildTeeList(); }
    else if (name === "hud") { el.screenHUD.classList.remove("hidden"); updateHUD(); }
  }

  // ===== COURSE SELECTION =====
  function buildCourseList() {
    el.courseList.innerHTML = "";
    listFocusIdx = 0;
    AVAILABLE_COURSES.forEach(function (c, idx) {
      var btn = document.createElement("button");
      btn.className = "nav-item focusable" + (idx === 0 ? " focused" : "");
      btn.tabIndex = 0;
      btn.innerHTML = '<span>' + c.name + '</span><span class="nav-sub">' + c.holes + ' holes &middot; ' + c.sub + '</span>';
      btn.onclick = function () { selectCourse(idx); };
      el.courseList.appendChild(btn);
    });
    focusList("courseList", 0);
    speak("Select a course. " + AVAILABLE_COURSES[0].name);
  }

  function selectCourse(idx) {
    var c = AVAILABLE_COURSES[idx];
    if (c.url) {
      fetch(c.url).then(function (r) { return r.json(); }).then(function (data) {
        COURSES[c.key] = data; activateCourse(c.key);
      }).catch(function () {
        showError("Could not load " + c.name + ". Check your connection.");
      });
    } else {
      activateCourse(c.key);
    }
  }

  function activateCourse(key) {
    activeCourse = COURSES[key];
    if (activeCourse.tees) { showScreen("tee"); }
    else { selectedTeeKey = null; showScreen("hud"); speak("Starting round at " + activeCourse.course); }
  }

  // ===== TEE SELECTION =====
  function buildTeeList() {
    el.teeList.innerHTML = "";
    listFocusIdx = 0;
    var tees = activeCourse.tees;
    var keys = Object.keys(tees);
    // Add "Skip" option first
    var skipBtn = document.createElement("button");
    skipBtn.className = "nav-item focusable focused";
    skipBtn.tabIndex = 0;
    skipBtn.innerHTML = '<span>GPS Distance Only</span><span class="nav-sub">no official yardage</span>';
    skipBtn.onclick = function () { selectedTeeKey = null; showScreen("hud"); speak("Starting round. GPS only."); };
    el.teeList.appendChild(skipBtn);
    keys.forEach(function (key, idx) {
      var t = tees[key];
      var btn = document.createElement("button");
      btn.className = "nav-item focusable";
      btn.tabIndex = 0;
      btn.innerHTML = '<span>' + t.label + ' Tees</span><span class="nav-sub">' + t.total.toLocaleString() + ' yd total</span>';
      btn.onclick = (function (k) { return function () { selectedTeeKey = k; showScreen("hud"); speak(tees[k].label + " tees selected."); }; })(key);
      el.teeList.appendChild(btn);
    });
    focusList("teeList", 0);
    speak("Select your tees.");
  }

  // ===== LIST KEYBOARD NAV =====
  function focusList(listId, idx) {
    var list = document.getElementById(listId);
    var items = list.querySelectorAll(".nav-item");
    items.forEach(function (item, i) { item.classList.toggle("focused", i === idx); });
    if (items[idx]) items[idx].focus();
    listFocusIdx = idx;
  }

  function navList(dir) {
    var listId = currentScreen === "course" ? "courseList" : "teeList";
    var list = document.getElementById(listId);
    var items = list.querySelectorAll(".nav-item");
    var next = Math.max(0, Math.min(items.length - 1, listFocusIdx + dir));
    focusList(listId, next);
    if (currentScreen === "course" && AVAILABLE_COURSES[next]) speak(AVAILABLE_COURSES[next].name);
    if (currentScreen === "tee") {
      var tees = activeCourse.tees;
      var keys = Object.keys(tees);
      if (next === 0) speak("GPS distance only");
      else { var k = keys[next - 1]; speak(tees[k].label + " tees. " + tees[k].total + " yards total."); }
    }
  }

  function selectFocused() {
    var listId = currentScreen === "course" ? "courseList" : "teeList";
    var list = document.getElementById(listId);
    var items = list.querySelectorAll(".nav-item");
    if (items[listFocusIdx]) items[listFocusIdx].click();
  }

  // ===== MATH =====
  function haversine(lat1, lng1, lat2, lng2) {
    var R = 6371000;
    var dLat = (lat2 - lat1) * Math.PI / 180;
    var dLng = (lng2 - lng1) * Math.PI / 180;
    var a = Math.sin(dLat/2)*Math.sin(dLat/2) + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)*Math.sin(dLng/2);
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }
  function m2y(m) { return Math.round(m * 1.09361); }
  function distTo(pt) { if (!pt || playerLat === null) return null; return haversine(playerLat, playerLng, pt.lat, pt.lng); }

  // ===== VOICE =====
  var hasSpeech = "speechSynthesis" in window;
  function speak(text) {
    if (!hasSpeech || !voiceOn) return;
    speechSynthesis.cancel();
    var u = new SpeechSynthesisUtterance(text);
    u.rate = 0.95;
    u.onstart = function () { el.tapHint.textContent = "speaking..."; el.tapHint.className = "tap-hint speaking"; };
    u.onend = function () { el.tapHint.textContent = "Enter or tap for voice"; el.tapHint.className = "tap-hint"; };
    speechSynthesis.speak(u);
  }
  function speakHUD() {
    if (!activeCourse) return;
    var hole = activeCourse.holes[currentHole];
    var dC = distTo(hole.green.center), dF = distTo(hole.green.front), dB = distTo(hole.green.back);
    var msg = "";
    if (dC !== null) msg += m2y(dC) + " to center.";
    if (dF !== null && dB !== null) msg += " Front " + m2y(dF) + ", back " + m2y(dB) + ".";
    var hz = hole.hazards.map(function (h) { return { label: h.label, dist: distTo(h) }; })
      .filter(function (h) { return h.dist !== null; }).sort(function (a,b) { return a.dist-b.dist; });
    if (hz.length) msg += " Nearest hazard " + m2y(hz[0].dist) + ".";
    if (hole.dogleg) { var d = distTo(hole.dogleg); if (d !== null) msg += " Dogleg " + m2y(d) + "."; }
    speak(msg);
  }
  function speakHoleChange(hole) {
    var dC = distTo(hole.green.center);
    var msg = "Hole " + hole.hole + ". Par " + (hole.par || "unknown") + ".";
    if (dC !== null) msg += " " + m2y(dC) + " yards.";
    speak(msg);
  }

  // ===== HOLE DETECTION =====
  function detectHole() {
    if (!activeCourse || playerLat === null) return;
    var nextIdx = currentHole + 1;
    if (nextIdx < 18) {
      var d = distTo(activeCourse.holes[nextIdx].tee);
      if (d !== null && d < 40) {
        currentHole = nextIdx;
        if (lastSpokenHole !== currentHole) { lastSpokenHole = currentHole; speakHoleChange(activeCourse.holes[currentHole]); }
      }
    }
  }

  // ===== HUD RENDER =====
  function updateHUD() {
    if (!activeCourse) return;
    var hole = activeCourse.holes[currentHole];
    el.holeNum.textContent = "HOLE " + hole.hole;
    var par = hole.par ? "Par " + hole.par : "";
    var official = "";
    if (selectedTeeKey && activeCourse.tees && activeCourse.tees[selectedTeeKey]) {
      var tee = activeCourse.tees[selectedTeeKey];
      official = tee.holes[currentHole] + " yd (" + tee.label + ")";
      el.teeBadge.innerHTML = tee.label.toUpperCase() + " TEES";
      el.officialYd.textContent = "Official: " + tee.holes[currentHole] + " yd";
    } else {
      el.teeBadge.innerHTML = "";
      el.officialYd.textContent = "";
    }
    el.holeMeta.textContent = par + (official ? " \u00b7 " + official : "");
    if (playerLat === null) return;
    var dC = distTo(hole.green.center), dF = distTo(hole.green.front), dB = distTo(hole.green.back);
    el.yardCenter.textContent = dC !== null ? m2y(dC) : "---";
    el.yardFront.textContent = dF !== null ? m2y(dF) : "--";
    el.yardBack.textContent = dB !== null ? m2y(dB) : "--";
    el.extraRow.innerHTML = "";
    if (hole.dogleg) { var dd = distTo(hole.dogleg); if (dd !== null) el.extraRow.innerHTML += '<div class="extra-item"><span class="dot-dg"></span><span class="extra-label">Dogleg</span><span class="extra-dist">' + m2y(dd) + '</span></div>'; }
    if (hole.layups && hole.layups.length) hole.layups.forEach(function (lp) { var dl = distTo(lp); if (dl !== null) el.extraRow.innerHTML += '<div class="extra-item"><span class="dot-lu"></span><span class="extra-label">' + (lp.label||"Layup") + '</span><span class="extra-dist">' + m2y(dl) + '</span></div>'; });
    var hz = hole.hazards.map(function (h) { return { label: h.label, dist: distTo(h) }; }).filter(function (h) { return h.dist!==null; }).sort(function (a,b) { return a.dist-b.dist; }).slice(0,3);
    el.hazardList.innerHTML = "";
    hz.forEach(function (h) { var d2 = document.createElement("div"); d2.className = "hz-row"; d2.innerHTML = '<span class="hz-dot"></span><span class="hz-name">' + h.label + '</span><span class="hz-dist">' + m2y(h.dist) + '</span>'; el.hazardList.appendChild(d2); });
    if (gpsAcc !== null) { var cls = gpsAcc<=5?"good":gpsAcc<=15?"warn":"bad"; el.gpsStatus.textContent = "GPS: \u00b1" + gpsAcc.toFixed(0) + "m"; el.gpsStatus.className = "gps-status " + cls; }
    renderDots();
  }

  function renderDots() {
    el.holeDots.innerHTML = "";
    for (var i = 0; i < 18; i++) { var d = document.createElement("div"); d.className = "hdot" + (i < currentHole ? " done" : "") + (i === currentHole ? " active" : ""); el.holeDots.appendChild(d); }
  }

  // ===== GPS =====
  function onPosition(pos) {
    playerLat = pos.coords.latitude; playerLng = pos.coords.longitude; gpsAcc = pos.coords.accuracy;
    if (el.loading.style.display !== "none" && !el.loading.classList.contains("hidden")) {
      el.loading.classList.add("hidden"); showScreen("course");
    }
    detectHole();
    if (currentScreen === "hud") updateHUD();
  }
  function onError(err) {
    var msgs = { 1:"Location permission denied. Allow location and reload.", 2:"Position unavailable. Go outdoors.", 3:"Location timed out." };
    el.loading.classList.add("hidden"); el.error.classList.remove("hidden");
    el.errTitle.textContent = "GPS Error"; el.errMsg.textContent = msgs[err.code] || "Error: " + err.message;
  }
  function showError(msg) { el.screenCourse.classList.add("hidden"); el.screenTee.classList.add("hidden"); el.screenHUD.classList.add("hidden"); el.error.classList.remove("hidden"); el.errMsg.textContent = msg; }

  if (!("geolocation" in navigator)) {
    el.loading.classList.add("hidden"); showScreen("course");
  } else {
    navigator.geolocation.watchPosition(onPosition, onError, { enableHighAccuracy: true, maximumAge: 0, timeout: 30000 });
  }

  // ===== CONTROLS =====
  el.prevBtn.addEventListener("click", function () { if (currentHole > 0) { currentHole--; lastSpokenHole = currentHole; speakHoleChange(activeCourse.holes[currentHole]); updateHUD(); } });
  el.nextBtn.addEventListener("click", function () { if (currentHole < 17) { currentHole++; lastSpokenHole = currentHole; speakHoleChange(activeCourse.holes[currentHole]); updateHUD(); } });
  el.yardageTap.addEventListener("click", function () { speakHUD(); });
  el.muteBtn.addEventListener("click", function () { voiceOn = !voiceOn; if (!voiceOn) { speechSynthesis.cancel(); el.muteBtn.textContent = "\u{1f507}"; el.muteBtn.classList.remove("on"); } else { el.muteBtn.textContent = "\u{1f50a}"; el.muteBtn.classList.add("on"); } });
  el.courseBtn.addEventListener("click", function () { showScreen("course"); });

  // ===== D-PAD KEYBOARD NAVIGATION (Meta requirement) =====
  document.addEventListener("keydown", function (e) {
    if (currentScreen === "course" || currentScreen === "tee") {
      if (e.key === "ArrowUp") { e.preventDefault(); navList(-1); }
      else if (e.key === "ArrowDown") { e.preventDefault(); navList(1); }
      else if (e.key === "Enter" || e.key === " ") { e.preventDefault(); selectFocused(); }
    } else if (currentScreen === "hud") {
      if (e.key === "ArrowLeft") { e.preventDefault(); el.prevBtn.click(); }
      else if (e.key === "ArrowRight") { e.preventDefault(); el.nextBtn.click(); }
      else if (e.key === "Enter" || e.key === " ") { e.preventDefault(); speakHUD(); }
      else if (e.key === "ArrowUp") { e.preventDefault(); speakHUD(); }
    }
  });

  if (!hasSpeech) { el.tapHint.textContent = "voice not available"; el.muteBtn.classList.add("hidden"); }
  renderDots();
})();
</script>
</body>
</html>
