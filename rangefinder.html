<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Plans2Putts — Rangefinder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --primary: #ffffff;
    --green: #4ade80;
    --green-dim: #22c55e;
    --amber: #fbbf24;
    --red: #f87171;
    --dim: #6b7280;
    --dim2: #374151;
    --panel: #111111;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; background: var(--bg); color: var(--primary); overflow: hidden; }
  body {
    font-family: 'DM Mono', ui-monospace, monospace;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100vh; padding: 16px;
  }

  /* --- HUD Container --- */
  .hud { width: 100%; max-width: 600px; display: flex; flex-direction: column; align-items: center; gap: 8px; }

  /* --- Hole indicator --- */
  .hole-bar {
    display: flex; align-items: center; gap: 16px; width: 100%;
    justify-content: center; padding: 8px 0;
  }
  .hole-bar button {
    font-family: 'DM Mono', monospace; font-size: 1.2rem; font-weight: 500;
    background: none; border: 2px solid var(--dim2); color: var(--dim);
    width: 44px; height: 44px; border-radius: 50%; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .hole-bar button:active { border-color: var(--green); color: var(--green); }
  .hole-info { text-align: center; }
  .hole-num { font-family: 'Anton', sans-serif; font-size: 1.6rem; letter-spacing: 0.05em; color: var(--green); }
  .hole-par { font-size: 0.75rem; color: var(--dim); letter-spacing: 0.15em; text-transform: uppercase; }

  /* --- Primary yardage --- */
  .yardage-wrap { text-align: center; padding: 8px 0; }
  .yardage-label { font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--dim); margin-bottom: -4px; }
  .yardage {
    font-family: 'Anton', sans-serif;
    font-size: min(28vw, 160px);
    line-height: 1;
    color: var(--primary);
    letter-spacing: -0.02em;
    text-shadow: 0 0 40px rgba(74, 222, 128, 0.15);
  }
  .yardage-unit { font-size: 0.7rem; letter-spacing: 0.15em; color: var(--dim); text-transform: uppercase; }

  /* --- Front / Back --- */
  .fb-row {
    display: flex; gap: 32px; justify-content: center;
    padding: 6px 0; border-top: 1px solid var(--dim2); border-bottom: 1px solid var(--dim2);
    width: 80%; max-width: 320px;
  }
  .fb-item { text-align: center; }
  .fb-label { font-size: 0.6rem; letter-spacing: 0.15em; color: var(--dim); text-transform: uppercase; }
  .fb-val { font-family: 'Anton', sans-serif; font-size: 2rem; color: var(--green); }

  /* --- Hazards --- */
  .hazards { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 4px; padding: 6px 0; }
  .hz-row {
    display: flex; align-items: center; gap: 8px;
    font-size: 0.8rem; color: var(--amber); padding: 4px 12px;
  }
  .hz-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--amber); flex: none; }
  .hz-name { flex: 1; color: var(--dim); font-size: 0.7rem; }
  .hz-dist { font-family: 'Anton', sans-serif; font-size: 1.1rem; }

  /* --- Dogleg / Layup --- */
  .extra-row { display: flex; gap: 24px; justify-content: center; padding: 2px 0; }
  .extra-item { display: flex; align-items: center; gap: 6px; font-size: 0.75rem; }
  .extra-item .dot-dg { width: 8px; height: 8px; border-radius: 50%; background: #facc15; }
  .extra-item .dot-lu { width: 8px; height: 8px; border-radius: 50%; background: #a78bfa; }
  .extra-dist { font-family: 'Anton', sans-serif; font-size: 1rem; }
  .extra-label { color: var(--dim); font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.1em; }

  /* --- Hole dots --- */
  .hole-dots { display: flex; gap: 5px; justify-content: center; padding: 8px 0; }
  .hdot { width: 8px; height: 8px; border-radius: 50%; background: var(--dim2); }
  .hdot.done { background: var(--dim); }
  .hdot.active { background: var(--green); box-shadow: 0 0 8px rgba(74, 222, 128, 0.5); }

  /* --- GPS status --- */
  .gps-status { font-size: 0.6rem; color: var(--dim); letter-spacing: 0.1em; text-align: center; padding: 4px; }
  .gps-status.good { color: var(--green-dim); }
  .gps-status.warn { color: var(--amber); }
  .gps-status.bad { color: var(--red); }

  /* --- Loading / error states --- */
  .state-msg {
    text-align: center; padding: 40px 20px;
  }
  .state-msg h2 { font-family: 'Anton', sans-serif; font-size: 2rem; margin-bottom: 12px; }
  .state-msg p { font-size: 0.85rem; color: var(--dim); line-height: 1.6; max-width: 300px; margin: 0 auto; }
  .spinner {
    width: 40px; height: 40px; border: 3px solid var(--dim2); border-top-color: var(--green);
    border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .hidden { display: none !important; }
</style>
</head>
<body>

  <!-- Loading state -->
  <div id="stateLoading" class="state-msg">
    <div class="spinner"></div>
    <h2>Acquiring GPS</h2>
    <p>Stand outside with a clear sky view. Allow location when prompted.</p>
  </div>

  <!-- Error state -->
  <div id="stateError" class="state-msg hidden">
    <h2 id="errTitle">GPS Unavailable</h2>
    <p id="errMsg">Could not access location.</p>
  </div>

  <!-- HUD -->
  <div id="hud" class="hud hidden">
    <div class="hole-bar">
      <button id="prevBtn">&#8249;</button>
      <div class="hole-info">
        <div class="hole-num" id="holeNum">HOLE 1</div>
        <div class="hole-par" id="holePar">Par 4</div>
      </div>
      <button id="nextBtn">&#8250;</button>
    </div>

    <div class="yardage-wrap">
      <div class="yardage-label">to center</div>
      <div class="yardage" id="yardCenter">---</div>
      <div class="yardage-unit">yards</div>
    </div>

    <div class="fb-row">
      <div class="fb-item">
        <div class="fb-label">Front</div>
        <div class="fb-val" id="yardFront">--</div>
      </div>
      <div class="fb-item">
        <div class="fb-label">Back</div>
        <div class="fb-val" id="yardBack">--</div>
      </div>
    </div>

    <div class="extra-row" id="extraRow"></div>

    <div class="hazards" id="hazardList"></div>

    <div class="hole-dots" id="holeDots"></div>

    <div class="gps-status" id="gpsStatus">GPS: acquiring...</div>
  </div>

  var holes = COURSE.holes;
  var currentHole = 0;
  var playerLat = null, playerLng = null, gpsAcc = null;

  // ===== DOM =====
  var el = {
    loading: document.getElementById("stateLoading"),
    error: document.getElementById("stateError"),
    errTitle: document.getElementById("errTitle"),
    errMsg: document.getElementById("errMsg"),
    hud: document.getElementById("hud"),
    holeNum: document.getElementById("holeNum"),
    holePar: document.getElementById("holePar"),
    yardCenter: document.getElementById("yardCenter"),
    yardFront: document.getElementById("yardFront"),
    yardBack: document.getElementById("yardBack"),

  };

  // ===== HAVERSINE =====
  function haversine(lat1, lng1, lat2, lng2) {
    var R = 6371000;
    var dLat = (lat2 - lat1) * Math.PI / 180;
    var dLng = (lng2 - lng1) * Math.PI / 180;
    var a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
      Math.sin(dLng / 2) * Math.sin(dLng / 2);
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  }

  function metersToYards(m) { return Math.round(m * 1.09361); }

  function distTo(pt) {
    if (!pt || playerLat === null) return null;
    return haversine(playerLat, playerLng, pt.lat, pt.lng);
  }

  // ===== HOLE DETECTION =====
  function detectHole() {
    if (playerLat === null) return;
    var nextIdx = currentHole + 1;
    if (nextIdx < 18) {
      var distToNextTee = distTo(holes[nextIdx].tee);
      if (distToNextTee !== null && distToNextTee < 40) {
        currentHole = nextIdx;
      }
    }
  }

  // ===== RENDER =====
  function renderHoleDots() {
    el.holeDots.innerHTML = "";
    for (var i = 0; i < 18; i++) {
      var d = document.createElement("div");
      d.className = "hdot" + (i < currentHole ? " done" : "") + (i === currentHole ? " active" : "");
      el.holeDots.appendChild(d);
    }
  }

  function update() {
    var hole = holes[currentHole];

    // Hole info
    el.holeNum.textContent = "HOLE " + hole.hole;
    el.holePar.textContent = "Par " + (hole.par || "—");

    if (playerLat === null) return;

    // Green distances
    var dCenter = distTo(hole.green.center);
    var dFront = distTo(hole.green.front);
    var dBack = distTo(hole.green.back);

    el.yardCenter.textContent = dCenter !== null ? metersToYards(dCenter) : "---";
    el.yardFront.textContent = dFront !== null ? metersToYards(dFront) : "--";
    el.yardBack.textContent = dBack !== null ? metersToYards(dBack) : "--";

    // Dogleg / Layup
    el.extraRow.innerHTML = "";
    if (hole.dogleg) {
      var dDog = distTo(hole.dogleg);
      if (dDog !== null) {
        el.extraRow.innerHTML += '<div class="extra-item"><span class="dot-dg"></span><span class="extra-label">Dogleg</span><span class="extra-dist">' + metersToYards(dDog) + '</span></div>';
      }
    }
    if (hole.layups && hole.layups.length) {
      hole.layups.forEach(function (lp) {
        var dLp = distTo(lp);
        if (dLp !== null) {
          el.extraRow.innerHTML += '<div class="extra-item"><span class="dot-lu"></span><span class="extra-label">' + (lp.label || "Layup") + '</span><span class="extra-dist">' + metersToYards(dLp) + '</span></div>';
        }
      });
    }

    // Hazards — show nearest 3 sorted by distance
    var hazards = hole.hazards.map(function (hz) {
      return { label: hz.label, dist: distTo(hz) };
    }).filter(function (h) { return h.dist !== null; })
      .sort(function (a, b) { return a.dist - b.dist; })
      .slice(0, 3);

    el.hazardList.innerHTML = "";
    hazards.forEach(function (hz) {
      var div = document.createElement("div"); div.className = "hz-row";
      div.innerHTML = '<span class="hz-dot"></span><span class="hz-name">' + hz.label + '</span><span class="hz-dist">' + metersToYards(hz.dist) + '</span>';
      el.hazardList.appendChild(div);
    });

    // GPS status
    if (gpsAcc !== null) {
      var cls = gpsAcc <= 5 ? "good" : gpsAcc <= 15 ? "warn" : "bad";
      el.gpsStatus.textContent = "GPS: \u00b1" + gpsAcc.toFixed(0) + "m";
      el.gpsStatus.className = "gps-status " + cls;
    }

    renderHoleDots();
  }

  // ===== GPS =====
  function onPosition(pos) {
    playerLat = pos.coords.latitude;
    playerLng = pos.coords.longitude;
    gpsAcc = pos.coords.accuracy;

    // First fix — show HUD
    if (!el.loading.classList.contains("hidden")) {
      el.loading.classList.add("hidden");
      el.hud.classList.remove("hidden");
      renderHoleDots();

      // Auto-detect starting hole (find nearest tee)
      var bestDist = Infinity, bestIdx = 0;
      holes.forEach(function (h, idx) {
        var d = distTo(h.tee);
        if (d !== null && d < bestDist) { bestDist = d; bestIdx = idx; }
      });
      currentHole = bestIdx;
    }

    detectHole();
    update();
  }

  function onError(err) {
    var msgs = {
      1: "Location permission denied. Allow location access and reload.",
      2: "Position unavailable. Make sure you are outdoors with GPS signal.",
      3: "Location request timed out. Try again."
    };
    el.loading.classList.add("hidden");
    el.error.classList.remove("hidden");
    el.errTitle.textContent = "GPS Error";
    el.errMsg.textContent = msgs[err.code] || ("Error: " + err.message);
  }

  if (!("geolocation" in navigator)) {
    el.loading.classList.add("hidden");
    el.error.classList.remove("hidden");
    el.errTitle.textContent = "No GPS";
    el.errMsg.textContent = "Geolocation is not available in this browser.";
  } else {
    navigator.geolocation.watchPosition(onPosition, onError, {
      enableHighAccuracy: true, maximumAge: 0, timeout: 30000
    });
  }

  // ===== NAV =====
  el.prevBtn.addEventListener("click", function () {
    if (currentHole > 0) { currentHole--; update(); }
  });
  el.nextBtn.addEventListener("click", function () {
    if (currentHole < 17) { currentHole++; update(); }
  });

  // Initial render
  update();
  renderHoleDots();
})();
</script>
</body>
</html>
